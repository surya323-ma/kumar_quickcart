{% extends "base.html" %}
{% block content %}
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="brand-mini">🛠️ Admin Panel</div>
    <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if active=='dashboard' else '' }}">📊 Dashboard</a>
    <a href="{{ url_for('admin_products') }}" class="{{ 'active' if active=='products' else '' }}">📦 Products &amp; Stock</a>
    <a href="{{ url_for('admin_orders') }}" class="{{ 'active' if active=='orders' else '' }}">🧾 Orders</a>
    <a href="{{ url_for('admin_complaints') }}" class="{{ 'active' if active=='complaints' else '' }}">📣 Complaints</a>
    <a href="{{ url_for('home') }}">🏬 View Storefront</a>
  </aside>
  <main class="admin-main">
    {% block admin_content %}{% endblock %}
  </main>
</div>
{% endblock %}
