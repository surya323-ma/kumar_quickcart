{% extends "base.html" %}
{% block title %}Create Account — Kumar QuickCart{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:480px;">
    <h2>Create your account 🌾</h2>
    <p class="sub">Link your ration card to start ordering</p>
    <form method="post">
      <div class="field"><label>Full Name</label><input type="text" name="name" required placeholder="Ravi Sharma"></div>
      <div class="field"><label>Email Address</label><input type="email" name="email" required placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="Create a password"></div>
      <div class="field"><label>Phone Number</label><input type="tel" name="phone" required placeholder="10-digit mobile number"></div>
      <div class="field"><label>Ration Card Number (optional)</label><input type="text" name="ration_card" placeholder="UP-RC-XXXXXX"></div>
      <div class="field"><label>Delivery Address</label><textarea name="address" rows="2" placeholder="House no, street, city, state, pincode"></textarea></div>
      <button class="btn btn-primary btn-block" type="submit">Create Account</button>
    </form>
    <div class="auth-foot">Already have an account? <a href="{{ url_for('login') }}">Login</a></div>
  </div>
</div>
{% endblock %}
