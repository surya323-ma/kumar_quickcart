{% extends "base.html" %}
{% block title %}Login — Kumar QuickCart{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome back 👋</h2>
    <p class="sub">Login to your Kumar QuickCart account</p>
    <div class="demo-box">
      <strong>Demo accounts</strong><br>
      Customer: ravi@example.com / ravi123<br>
      Admin: admin@quickcart.com / admin123
    </div>
    <form method="post">
      <div class="field"><label>Email Address</label><input type="email" name="email" required placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" type="submit">Login</button>
    </form>
    <div class="auth-foot">New here? <a href="{{ url_for('register') }}">Create an account</a></div>
  </div>
</div>
{% endblock %}
